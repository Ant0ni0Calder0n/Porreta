<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Porreta - Apuestas</title>
    <script>
      (function(location) {
        var basePath = '/Porreta/';
        var path = location.pathname;

        if (!path.startsWith(basePath)) {
          location.replace(basePath);
          return;
        }

        var redirect = path.slice(basePath.length) + location.search;
        location.replace(basePath + '?redirect=' + encodeURIComponent(redirect) + location.hash);
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
